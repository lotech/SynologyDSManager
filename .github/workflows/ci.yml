name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      # Third-party actions are pinned by full commit SHA rather than a
      # mutable tag, so an upstream compromise can't silently change what
      # runs in our CI. Update the SHA when bumping to a new release of
      # actions/checkout.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project SynologyDSManager.xcodeproj \
            -scheme SynologyDSManager \
            -resolvePackageDependencies

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project SynologyDSManager.xcodeproj \
            -scheme SynologyDSManager \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: Test
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project SynologyDSManager.xcodeproj \
            -scheme SynologyDSManager \
            -resolvePackageDependencies

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project SynologyDSManager.xcodeproj \
            -scheme SynologyDSManagerTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict --reporter github-actions-logging || true
        # Non-blocking until we clean up existing warnings in a follow-up PR.

  format:
    name: SwiftFormat (check)
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint . || true
        # Non-blocking until the codebase has been re-formatted.
